version: '3.7'
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8080:80
    depends_on:
      - db
  db:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: test-docker-db
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_PASSWORD: 1234
      MYSQL_USER: admin
    ports:
      - "6033:3306"   #Export external port 6033 mapped to internal of 3306
    volumes:
      - swmdbdata:/var/lib/mysql
volumes:
  swmdbdata:
    name: swmdbdata
